name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          LDFLAGS="-s -w -X main.version=${{ github.ref_name }}"
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/openclaw-exporter-linux-amd64   ./cmd/openclaw-exporter
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/openclaw-exporter-linux-arm64   ./cmd/openclaw-exporter
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/openclaw-exporter-darwin-amd64  ./cmd/openclaw-exporter
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/openclaw-exporter-darwin-arm64  ./cmd/openclaw-exporter
          ls -la dist/

      - name: Add binaries to release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          allowUpdates: true
          omitBodyDuringUpdate: true

  build-and-push-docker-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            sammylin/openclaw-exporter
            ghcr.io/sammylin/openclaw-exporter
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
