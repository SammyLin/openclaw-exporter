global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mochi-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # OpenClaw Metrics via OTEL Collector
  - job_name: 'openclaw-otel'
    static_configs:
      - targets: ['otel-collector:8889']

  # OpenClaw Gateway Exporter (custom)
  - job_name: 'openclaw-exporter'
    static_configs:
      - targets: ['host.docker.internal:9101']
